services:

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - GGML_BACKEND=${GGML_BACKEND:-cpu}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./indexes:/app/indexes
    depends_on:
      - chroma
    command: uv run python api.py

  crawl:
    build: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./indexes:/app/indexes
    command: >
      /bin/sh -c "
        uv run scrapy crawl xataka_mobile > logs/xataka_mobile.log 2>&1 &
        uv run scrapy crawl xataka_pc     > logs/xataka_pc.log 2>&1 &
        wait && echo 'All spiders finished.'
      "

  index:
    build: .
    depends_on:
      - crawl
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
    environment:
      - GGML_BACKEND=${GGML_BACKEND:-cpu}
    command: uv run python -m src.indexing.indexer

  chroma:
    image: chromadb/chroma:0.5.5
    volumes:
      - ./indexes/chroma:/chroma/data
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data

  vector-index:
    build: .
    depends_on:
      - index
      - chroma
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - GGML_BACKEND=${GGML_BACKEND:-cpu}
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
    command: uv run python main.py --build

  query:
    build: .
    depends_on:
      - vector-index
      - chroma
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - GGML_BACKEND=${GGML_BACKEND:-cpu}
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
    stdin_open: true
    tty: true
    command: uv run python main.py --query

  rag:
    build: .
    depends_on:
      - vector-index
      - chroma
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - GGML_BACKEND=${GGML_BACKEND:-cpu}
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
      - ./models:/app/models
    stdin_open: true
    tty: true
    command: uv run python main.py --query --rag

  rag-test:
    build: .
    depends_on:
      - vector-index
      - chroma
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - GGML_BACKEND=${GGML_BACKEND:-cpu}
    volumes:
      - ./data:/app/data
      - ./indexes:/app/indexes
      - ./tests:/app/tests
    command: >
      /bin/sh -c "
        uv sync --group dev &&
        uv run python -m pytest tests/test_rag.py -v
      "

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api